name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Validasi Endpoint API
      id: validasi-endpoint-api
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Validasi Endpoint API
        setup-command: pip install -r requirements.txt
        command: pytest tests/test_api.py -v
        timeout: 10
        max-score: 100
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        VALIDASI-ENDPOINT-API_RESULTS: "${{steps.validasi-endpoint-api.outputs.result}}"
      with:
        runners: validasi-endpoint-api
